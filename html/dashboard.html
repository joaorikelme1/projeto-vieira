<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — Supermercado Vieira</title>
  <link rel="stylesheet" href="../css/base.css"/>
  <link rel="stylesheet" href="../css/layout.css"/>
  <link rel="stylesheet" href="../css/components.css"/>
  <link rel="stylesheet" href="../css/dashboard.css"/>
  <link rel="stylesheet" href="../css/theme.css"/>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js"></script>
</head>
<body class="theme-light">
<div class="sidebar-overlay" id="sidebarOverlay"></div>
<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="sidebar__logo">
      <img src="../assets/images/logo.svg" alt="Logo Supermercado Vieira" class="brand-logo"/>
      <div>
        <div class="sidebar__brand-name">Supermercado Vieira</div>
        <div class="sidebar__brand-tag">Gestão Financeira</div>
      </div>
    </div>
    <nav class="sidebar__nav">
      <div class="nav-section-label">Principal</div>
      <div class="nav-item active" data-section="dashboard">Dashboard</div>
      <div class="nav-item" data-section="contas-pagar">Contas a Pagar</div>
      <div class="nav-item" data-section="contas-receber">Contas a Receber</div>
      <div class="nav-item" data-section="categorias">Categorias</div>
      <div class="nav-item" data-section="funcionarios">Funcionários</div>
      <div class="nav-item" data-section="vales">Vales</div>
      <div class="nav-section-label" style="margin-top:var(--s3)">Análise</div>
      <div class="nav-item" data-section="relatorios">Relatórios</div>
    </nav>
    <div class="sidebar__footer">
      <div class="user-row">
        <div class="user-avatar">A</div>
        <div class="user-info">
          <div class="user-name">Administrador</div>
          <div class="user-role">Usuário único</div>
        </div>
        <button class="btn-logout" id="btnLogout" title="Sair" aria-label="Sair">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        </button>
      </div>
    </div>
  </aside>

  <div class="main-area">
    <header class="top-header">
      <div class="top-header__left">
        <button class="btn-menu" id="btnMenu" aria-label="Menu">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        </button>
        <span class="top-header__title" id="headerTitle">Dashboard</span>
      </div>
      <div class="top-header__right">
        <button class="theme-toggle" id="btnTheme" title="Alternar tema" aria-label="Alternar tema">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3c0 .28 0 .57.02.85A7 7 0 0 0 20.15 12c.28 0 .57 0 .85-.02Z"/></svg>
        </button>
        <div class="header-date" id="headerDate"><span></span></div>
      </div>
    </header>

    <main class="page-content">
      <section class="page-section active" id="section-dashboard"></section>
      <section class="page-section" id="section-contas-pagar"></section>
      <section class="page-section" id="section-contas-receber"></section>
      <section class="page-section" id="section-categorias"></section>
      <section class="page-section" id="section-funcionarios"></section>
      <section class="page-section" id="section-vales"></section>
      <section class="page-section" id="section-relatorios"></section>
    </main>
  </div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script src="../js/services/storageService.js"></script>
<script src="../js/services/fileService.js"></script>
<script src="../js/services/financeService.js"></script>
<script src="../js/controllers/authController.js"></script>
<script src="../js/views/dashboardView.js"></script>
<script src="../js/controllers/mainController.js"></script>
<script src="../js/app.js"></script>
</body>
</html>
